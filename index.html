<!DOCTYPE html>
<html>
<head>
  <title>DevOps Quiz App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>DevOps Quiz App</h1>

  <!-- Topic selection -->
  <label for="topic">Choose a topic:</label>
  <select id="topic"></select>

  <!-- Question display -->
  <div id="quiz">
    <p id="question"></p>
    <div id="options"></div>
    <p id="feedback"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
